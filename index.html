<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frames — a photo journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #121210;
    --bg-elevated: #1b1a17;
    --text: #ece7dd;
    --text-muted: #918c80;
    --hairline: #2d2b26;
    --accent: #b8462f; /* darkroom safelight red */
    --accent-dim: rgba(184,70,47,0.35);
  }

  * { box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* --- sprocket strip, top & bottom --- */
  .sprocket-strip{
    height: 22px;
    width: 100%;
    background-image: radial-gradient(circle, var(--bg) 3.5px, transparent 3.6px);
    background-size: 28px 22px;
    background-position: 14px center;
    background-color: #060605;
    border-top: 1px solid var(--hairline);
    border-bottom: 1px solid var(--hairline);
  }

  header{
    padding: 6vw 6vw 4vw;
    background: #060605;
    border-bottom: 1px solid var(--hairline);
  }

  .eyebrow{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 1.1rem;
  }

  h1{
    font-family: 'Fraunces', serif;
    font-optical-sizing: auto;
    font-weight: 500;
    font-size: clamp(2.4rem, 6vw, 4.6rem);
    line-height: 1.02;
    letter-spacing: -0.01em;
    margin: 0 0 1.2rem;
    max-width: 16ch;
  }

  header p.sub{
    font-size: 1rem;
    color: var(--text-muted);
    max-width: 46ch;
    line-height: 1.6;
    margin: 0;
  }

  main{
    padding: 5vw 6vw 8vw;
  }

  .gallery{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 2.6rem 1.8rem;
  }

  figure.frame{
    margin: 0;
    opacity: 0;
    transform: translateY(14px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  figure.frame.visible{
    opacity: 1;
    transform: translateY(0);
  }

  .frame-photo{
    position: relative;
    overflow: hidden;
    background: var(--bg-elevated);
    border: 1px solid var(--hairline);
    cursor: zoom-in;
  }

  .frame-photo img{
    display: block;
    width: 100%;
    height: auto;
    aspect-ratio: 4 / 5;
    object-fit: cover;
    filter: grayscale(0.08) contrast(1.02);
    transition: transform 0.7s cubic-bezier(.2,.7,.2,1), filter 0.5s ease;
  }

  .frame-photo:hover img{
    transform: scale(1.035);
    filter: grayscale(0) contrast(1.05);
  }

  .frame-number{
    position: absolute;
    top: 0.7rem;
    left: 0.7rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.05em;
    color: #d9d4c8;
    background: rgba(6,6,5,0.55);
    padding: 0.2rem 0.5rem;
    border: 1px solid rgba(236,231,221,0.2);
  }

  figcaption{
    margin-top: 0.65rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.74rem;
    line-height: 1.55;
    color: var(--text-muted);
    display: flex;
    flex-wrap: wrap;
    gap: 0 0.9rem;
  }

  figcaption .cap-title{
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.92rem;
    color: var(--text);
    width: 100%;
    margin-bottom: 0.15rem;
  }

  figcaption span::before{
    content: "· ";
    color: var(--accent);
  }
  figcaption span:first-of-type::before{
    content: "";
  }

  /* --- lightbox --- */
  .lightbox{
    position: fixed;
    inset: 0;
    background: rgba(6,6,5,0.94);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4vw;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 100;
  }
  .lightbox.open{ opacity: 1; pointer-events: auto; }

  .lightbox img{
    max-width: 100%;
    max-height: 78vh;
    border: 1px solid var(--hairline);
  }

  .lightbox-panel{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    max-width: 90vw;
  }

  .lightbox-caption{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-muted);
    text-align: center;
  }

  .lightbox-actions{
    display: flex;
    gap: 0.9rem;
  }

  .lightbox-actions a, .lightbox-actions button{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text);
    background: transparent;
    border: 1px solid var(--hairline);
    padding: 0.55rem 1.1rem;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.2s ease, color 0.2s ease;
  }

  .lightbox-actions a:hover, .lightbox-actions button:hover{
    border-color: var(--accent);
    color: var(--accent);
  }

  footer{
    padding: 3vw 6vw 4vw;
    color: var(--text-muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.03em;
    background: #060605;
    border-top: 1px solid var(--hairline);
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; }
  }

  :focus-visible{
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
</style>
</head>
<body>

<div class="sprocket-strip" aria-hidden="true"></div>

<header>
  <p class="eyebrow">Roll 001 — Joo Chiat, Jan 2026</p>
  <h1>Frames, kept.</h1>
  <p class="sub">A walk through Joo Chiat, shot on the Olympus E-M1 Mark II. Tap any frame for the full-resolution original.</p>
</header>

<main>
  <div class="gallery" id="gallery"></div>
</main>

<div class="sprocket-strip" aria-hidden="true"></div>

<footer>
  Hosted on GitHub Pages · Media served via Cloudinary · Updated by hand
</footer>

<div class="lightbox" id="lightbox">
  <div class="lightbox-panel">
    <img id="lightbox-img" src="" alt="">
    <p class="lightbox-caption" id="lightbox-caption"></p>
    <div class="lightbox-actions">
      <a id="lightbox-download" href="#" download>Download full-res</a>
      <button id="lightbox-close" type="button">Close</button>
    </div>
  </div>
</div>

<script>
  // ---------------------------------------------------------------
  // Replace the entries below with your own Cloudinary photos.
  // "src"      -> your Cloudinary delivery URL (with transformations for
  //               the thumbnail, e.g. w_600,c_fill,q_auto,f_auto)
  // "download" -> the full-resolution original, e.g. add fl_attachment
  //               to the same public_id with no size transform
  // ---------------------------------------------------------------
  // Cloudinary cloud name
  const CLOUD_NAME = "ikxlglox";

  function thumb(publicId){
    return `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/w_600,c_fill,q_auto,f_auto/${publicId}.jpg`;
  }
  function full(publicId){
    return `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/fl_attachment/${publicId}.jpg`;
  }

  // Edit the "title" fields below to caption each photo as you like.
  // Camera/lens/location are placeholders — update to match each shot.
  const publicIds = [
    "20260117_EM50253_qrspor",
    "20260117_EM50256_v46lnb",
    "20260117_EM50262_p8zyck",
    "20260117_EM50275_l6q6er",
    "20260117_EM50297_wqhqj8",
    "20260117_EM50313_k1u3um",
    "20260117_EM50319_pekdid",
    "20260117_EM50322_yvdbud",
    "20260117_EM50332_czzhe6",
    "20260117_EM50343_mxaldi",
    "20260117_EM50347_zahqj7",
    "20260117_EM50372_qomvur",
    "20260117_EM50399_bcbmqs",
    "20260117_EM50400_eplatr",
    "20260117_EM50423_qck5rp",
    "20260117_EM50425_fyrgur",
    "20260117_EM50428_jnaunr",
    "20260117_EM50484_qwpswq",
    "20260117_EM50491_glri3z",
    "20260117_EM50499_hzw7g4",
    "20260117_EM50517_yokw6l",
    "20260117_EM50519_ybyw2n",
    "20260117_EM50524_ihny15",
    "20260117_EM50532_vvpaay",
    "20260117_EM50594_ylcc7z",
    "20260117_EM50604_ogsmc9",
    "20260117_EM50618_coy0et",
    "20260117_EM50627_soqeny",
    "20260117_EM50648_fxunv3",
    "20260117_EM50660_gm4mld",
    "20260117_EM50712_bf7uof"
  ];

  const titles = [
    "A shophouse in Joo Chiat blue, morning light catching the arches upstairs",
    "Weathered shutters and peeling paint — decades layered into the facade",
    "Two friends pause mid-conversation, a mural watching over the street",
    "A bicycle rests on a hand-painted stretch of road, colour underfoot",
    "A street cat holds its ground, unbothered by the lens",
    "A small shrine built into a mural wall, tucked between colour and concrete",
    "Framed by carved wood, a moment of shared delight at a shopfront window",
    "Notes and receipts pinned above a red scarf — a quiet corner of commerce",
    "A spiral staircase winds up the side of a sun-faded yellow shophouse",
    "Blue and yellow trade places on adjoining facades, a rhythm of colour along the row",
    "Ornate pilasters frame the everyday — a walk past painted heritage",
    "The Barkery's sign hangs quiet, waiting for its next customer",
    "A figure crosses a shaded breezeway, black frames against white walls",
    "House number 67, painted in a small mosaic — Joo Chiat's quiet signage",
    "The Panic Room's shopfront, layered in stickers and signage — a barbershop with a punk edge",
    "A quiet coffee break, phone in hand, morning light through the window",
    "444 Joo Chiat Road — a snack counter mid-morning, glass case catching the light",
    "A figure walks the breezeway between shophouses, a cone marking a wet floor",
    "Katong Bakery's red facade, arches catching the afternoon sun as traffic passes",
    "A closer look at the same red row — reflections of the street layered into its windows",
    "Geometric brick lattice — a modern counterpoint to the heritage shophouses nearby",
    "328 Katong Laksa, a Joo Chiat institution, signage bright against red tile",
    "Katong Shopping Centre's blue facade, round windows like portholes",
    "A water lily opens fully, purple petals around a gold centre",
    "A craftsman works bare-shouldered at an open-air stall, tools spread before him",
    "Hands at work over a small plant, a bicycle waiting close by",
    "Two riders check a phone before the next delivery, helmets still on",
    "Tin Yeang Restaurant's sign beside a red car — a street caught between eras",
    "Figment's pink and blue shophouse, a woman in a sun hat passing by",
    "The same pastel row, another passerby, a green bin in tow",
    "Koon Seng Road meets Tembeling — a convex mirror holding the street in miniature"
  ];

  const photos = publicIds.map((id, i) => ({
    title: titles[i],
    src: thumb(id),
    download: full(id),
    location: "Joo Chiat, SG"
  }));

  const gallery = document.getElementById('gallery');

  photos.forEach((p, i) => {
    const fig = document.createElement('figure');
    fig.className = 'frame';
    fig.innerHTML = `
      <div class="frame-photo" tabindex="0" role="button" aria-label="Open ${p.title} full size">
        <span class="frame-number">F${String(i + 1).padStart(3, '0')}</span>
        <img src="${p.src}" alt="${p.title}" loading="lazy">
      </div>
      <figcaption>
        <span class="cap-title">${p.title}</span>
        <span>${p.location}</span>
      </figcaption>
    `;
    gallery.appendChild(fig);

    const opener = () => openLightbox(p);
    fig.querySelector('.frame-photo').addEventListener('click', opener);
    fig.querySelector('.frame-photo').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); opener(); }
    });
  });

  // scroll reveal
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        io.unobserve(e.target);
      }
    });
  }, { threshold: 0.12 });
  document.querySelectorAll('figure.frame').forEach(f => io.observe(f));

  // lightbox
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lightbox-img');
  const lbCap = document.getElementById('lightbox-caption');
  const lbDownload = document.getElementById('lightbox-download');
  const lbClose = document.getElementById('lightbox-close');

  function openLightbox(p){
    lbImg.src = p.download;
    lbImg.alt = p.title;
    lbCap.textContent = `${p.title} — ${p.location}`;
    lbDownload.href = p.download;
    lightbox.classList.add('open');
  }
  function closeLightbox(){
    lightbox.classList.remove('open');
    lbImg.src = "";
  }
  lbClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });
</script>

</body>
</html>
