<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frames — a photo journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #000000;
    --text: #f5f5f7;
    --text-dim: #86868b;
    --hairline: rgba(255,255,255,0.08);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html { scroll-behavior: smooth; }

  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
  }

  header{
    padding: 12vw 6vw 5vw;
    text-align: left;
  }

  header p.eyebrow{
    font-size: 0.8rem;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin: 0 0 1.4rem;
  }

  h1{
    font-weight: 200;
    font-size: clamp(2.6rem, 7vw, 5.2rem);
    line-height: 1.04;
    letter-spacing: -0.02em;
    margin: 0 0 1.4rem;
    max-width: 18ch;
  }

  header p.sub{
    font-weight: 300;
    font-size: 1.05rem;
    line-height: 1.6;
    color: var(--text-dim);
    max-width: 44ch;
    margin: 0;
  }

  main{
    padding: 0 3vw 10vw;
  }

  /* --- masonry via CSS columns --- */
  .gallery{
    column-count: 1;
    column-gap: 6px;
  }
  @media (min-width: 560px){
    .gallery{ column-count: 2; }
  }
  @media (min-width: 900px){
    .gallery{ column-count: 3; }
  }
  @media (min-width: 1300px){
    .gallery{ column-count: 4; }
  }

  figure.tile{
    margin: 0 0 6px;
    break-inside: avoid;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.35s ease, transform 0.35s ease;
    cursor: pointer;
  }

  figure.tile.visible{
    opacity: 1;
    transform: translateY(0);
  }

  figure.tile img{
    display: block;
    width: 100%;
    height: auto;
    transition: transform 0.3s cubic-bezier(.2,.7,.2,1), filter 0.3s ease;
  }

  figure.tile:hover img{
    transform: scale(1.015);
    filter: brightness(1.04);
  }

  /* --- lightbox --- */
  .lightbox{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.98);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s ease;
    z-index: 100;
  }
  .lightbox.open{ opacity: 1; pointer-events: auto; }

  .lightbox-close{
    position: absolute;
    top: 2rem;
    right: 2.5vw;
    background: none;
    border: none;
    color: var(--text);
    font-size: 1.6rem;
    font-weight: 200;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s ease;
    line-height: 1;
    padding: 0.5rem;
  }
  .lightbox-close:hover{ opacity: 1; }

  .lightbox-stage{
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4vh 4vw 2vh;
    min-height: 0;
  }

  .lightbox-stage img{
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    opacity: 0;
    transform: scale(0.985);
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .lightbox-stage img.shown{
    opacity: 1;
    transform: scale(1);
  }

  .lightbox-info{
    text-align: center;
    padding: 0 6vw 1.6rem;
  }

  .lightbox-title{
    font-weight: 300;
    font-size: 0.95rem;
    color: var(--text);
    margin: 0 0 0.3rem;
  }

  .lightbox-meta{
    font-weight: 300;
    font-size: 0.8rem;
    color: var(--text-dim);
    margin: 0 0 0.3rem;
  }

  .lightbox-exif{
    font-weight: 300;
    font-size: 0.75rem;
    letter-spacing: 0.02em;
    color: var(--text-dim);
    opacity: 0.75;
    margin: 0 0 0.9rem;
  }

  .lightbox-download{
    font-weight: 400;
    font-size: 0.78rem;
    letter-spacing: 0.04em;
    color: var(--text-dim);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: color 0.2s ease, border-color 0.2s ease;
  }
  .lightbox-download:hover{
    color: var(--text);
    border-color: var(--text-dim);
  }

  /* --- lightstrip --- */
  .lightstrip{
    width: 100%;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 0 3vw 2.2rem;
    scrollbar-width: none;
  }
  .lightstrip::-webkit-scrollbar{ display: none; }

  .lightstrip img{
    height: 56px;
    width: 56px;
    object-fit: cover;
    flex: 0 0 auto;
    opacity: 0.35;
    cursor: pointer;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .lightstrip img:hover{ opacity: 0.7; }
  .lightstrip img.active{
    opacity: 1;
    transform: scale(1.06);
  }

  footer{
    padding: 3vw 6vw 5vw;
    color: var(--text-dim);
    font-size: 0.75rem;
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; }
  }

  :focus-visible{
    outline: 1px solid var(--text-dim);
    outline-offset: 3px;
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">Roll 001 — Joo Chiat, Jan 2026</p>
  <h1>Frames, kept.</h1>
  <p class="sub">A walk through Joo Chiat, shot on the Olympus E-M5 Mark II. Tap any photograph to view it full size.</p>
</header>

<main>
  <div class="gallery" id="gallery"></div>
</main>

<footer>
  Hosted on GitHub Pages · Media served via Cloudinary
</footer>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
  <div class="lightbox-stage">
    <img id="lightbox-img" src="" alt="">
  </div>
  <div class="lightbox-info">
    <p class="lightbox-title" id="lightbox-title"></p>
    <p class="lightbox-meta" id="lightbox-meta"></p>
    <p class="lightbox-exif" id="lightbox-exif"></p>
    <a class="lightbox-download" id="lightbox-download" href="#" download>Download original</a>
  </div>
  <div class="lightstrip" id="lightstrip"></div>
</div>

<script>
  const CLOUD_NAME = "ikxlglox";

  function thumb(publicId){
    return `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/w_800,q_auto,f_auto/${publicId}.jpg`;
  }
  function stageImg(publicId){
    return `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/w_1600,q_auto,f_auto/${publicId}.jpg`;
  }
  function full(publicId){
    return `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/fl_attachment/${publicId}.jpg`;
  }

  const publicIds = [
    "20260117-20260117_EM50253_uxitql",
    "20260117-20260117_EM50256_tymd1j",
    "20260117-20260117_EM50262_ejtcvu",
    "20260117-20260117_EM50275_nqt6zq",
    "20260117-20260117_EM50297_mdrxk1",
    "20260117-20260117_EM50313_izqprw",
    "20260117-20260117_EM50319_zmdlk6",
    "20260117-20260117_EM50322_evlprw",
    "20260117-20260117_EM50332_m7j9xj",
    "20260117-20260117_EM50343_www6yr",
    "20260117-20260117_EM50347_jav12l",
    "20260117-20260117_EM50372_tbwwmu",
    "20260117-20260117_EM50399_damfyf",
    "20260117-20260117_EM50400_otnre5",
    "20260117-20260117_EM50423_lyq5km",
    "20260117-20260117_EM50425_viuddl",
    "20260117-20260117_EM50428_w0mek5",
    "20260117-20260117_EM50484_u5bhqg",
    "20260117-20260117_EM50491_cx9y3x",
    "20260117-20260117_EM50499_tngsxq",
    "20260117-20260117_EM50517_k84qas",
    "20260117-20260117_EM50519_u5bvsu",
    "20260117-20260117_EM50524_whuc3l",
    "20260117-20260117_EM50532_mjyo1l",
    "20260117-20260117_EM50594_pxgzs8",
    "20260117-20260117_EM50604_eecx6s",
    "20260117-20260117_EM50618_hpastd",
    "20260117-20260117_EM50627_amsvem",
    "20260117-20260117_EM50648_urm19j",
    "20260117-20260117_EM50660_igtbgq",
    "20260117-20260117_EM50712_tq7euk"
  ];

  const titles = [
    "A shophouse in Joo Chiat blue, morning light catching the arches upstairs",
    "Weathered shutters and peeling paint — decades layered into the facade",
    "Two friends pause mid-conversation, a mural watching over the street",
    "A bicycle rests on a hand-painted stretch of road, colour underfoot",
    "A street cat holds its ground, unbothered by the lens",
    "A small shrine built into a mural wall, tucked between colour and concrete",
    "Framed by carved wood, a moment of shared delight at a shopfront window",
    "Notes and receipts pinned above a red scarf — a quiet corner of commerce",
    "A spiral staircase winds up the side of a sun-faded yellow shophouse",
    "Blue and yellow trade places on adjoining facades, a rhythm of colour along the row",
    "Ornate pilasters frame the everyday — a walk past painted heritage",
    "The Barkery's sign hangs quiet, waiting for its next customer",
    "A figure crosses a shaded breezeway, black frames against white walls",
    "House number 67, painted in a small mosaic — Joo Chiat's quiet signage",
    "The Panic Room's shopfront, layered in stickers and signage — a barbershop with a punk edge",
    "A quiet coffee break, phone in hand, morning light through the window",
    "444 Joo Chiat Road — a snack counter mid-morning, glass case catching the light",
    "A figure walks the breezeway between shophouses, a cone marking a wet floor",
    "Katong Bakery's red facade, arches catching the afternoon sun as traffic passes",
    "A closer look at the same red row — reflections of the street layered into its windows",
    "Geometric brick lattice — a modern counterpoint to the heritage shophouses nearby",
    "328 Katong Laksa, a Joo Chiat institution, signage bright against red tile",
    "Katong Shopping Centre's blue facade, round windows like portholes",
    "A water lily opens fully, purple petals around a gold centre",
    "A craftsman works bare-shouldered at an open-air stall, tools spread before him",
    "Hands at work over a small plant, a bicycle waiting close by",
    "Two riders check a phone before the next delivery, helmets still on",
    "Tin Yeang Restaurant's sign beside a red car — a street caught between eras",
    "Figment's pink and blue shophouse, a woman in a sun hat passing by",
    "The same pastel row, another passerby, a green bin in tow",
    "Koon Seng Road meets Tembeling — a convex mirror holding the street in miniature"
  ];

  // Fill in real EXIF per photo once available, e.g.:
  // { focalLength: "25mm", aperture: "f/4", shutterSpeed: "1/640s", iso: "200" }
  const exifData = {};

  const photos = publicIds.map((id, i) => ({
    id,
    title: titles[i],
    thumb: thumb(id),
    stage: stageImg(id),
    download: full(id),
    location: "Joo Chiat, SG",
    exif: exifData[id] || null
  }));

  const gallery = document.getElementById('gallery');
  const strip = document.getElementById('lightstrip');

  photos.forEach((p, i) => {
    const fig = document.createElement('figure');
    fig.className = 'tile';
    fig.innerHTML = `<img src="${p.thumb}" alt="${p.title}" loading="lazy">`;
    fig.addEventListener('click', () => openLightbox(i));
    gallery.appendChild(fig);

    const stripImg = document.createElement('img');
    stripImg.src = p.thumb;
    stripImg.alt = p.title;
    stripImg.dataset.index = i;
    stripImg.addEventListener('click', (e) => {
      e.stopPropagation();
      openLightbox(i);
    });
    strip.appendChild(stripImg);
  });

  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        io.unobserve(e.target);
      }
    });
  }, { threshold: 0.08 });
  document.querySelectorAll('figure.tile').forEach(f => io.observe(f));

  // lightbox
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lightbox-img');
  const lbTitle = document.getElementById('lightbox-title');
  const lbMeta = document.getElementById('lightbox-meta');
  const lbExif = document.getElementById('lightbox-exif');
  const lbDownload = document.getElementById('lightbox-download');
  const lbClose = document.getElementById('lightbox-close');
  let currentIndex = 0;

  function openLightbox(index){
    currentIndex = index;
    renderLightbox();
    lightbox.classList.add('open');
  }

  function renderLightbox(){
    const p = photos[currentIndex];
    lbImg.classList.remove('shown');
    const nextSrc = p.stage;
    const preload = new Image();
    preload.onload = () => {
      lbImg.src = nextSrc;
      requestAnimationFrame(() => lbImg.classList.add('shown'));
    };
    preload.src = nextSrc;

    lbImg.alt = p.title;
    lbTitle.textContent = p.title;
    lbMeta.textContent = p.location;

    if (p.exif) {
      const parts = [p.exif.focalLength, p.exif.aperture, p.exif.shutterSpeed, p.exif.iso ? `ISO ${p.exif.iso}` : null].filter(Boolean);
      lbExif.textContent = parts.join(' · ');
      lbExif.style.display = parts.length ? 'block' : 'none';
    } else {
      lbExif.textContent = '';
      lbExif.style.display = 'none';
    }

    lbDownload.href = p.download;

    strip.querySelectorAll('img').forEach((el, i) => {
      el.classList.toggle('active', i === currentIndex);
    });
    const activeStripImg = strip.children[currentIndex];
    if (activeStripImg) activeStripImg.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }

  function closeLightbox(){
    lightbox.classList.remove('open');
  }

  lbClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeLightbox();
  });
  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowRight') { currentIndex = (currentIndex + 1) % photos.length; renderLightbox(); }
    if (e.key === 'ArrowLeft') { currentIndex = (currentIndex - 1 + photos.length) % photos.length; renderLightbox(); }
  });
</script>

</body>
</html>
