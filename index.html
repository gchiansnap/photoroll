<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frames — a photo journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #121210;
    --bg-elevated: #1b1a17;
    --text: #ece7dd;
    --text-muted: #918c80;
    --hairline: #2d2b26;
    --accent: #b8462f; /* darkroom safelight red */
    --accent-dim: rgba(184,70,47,0.35);
  }

  * { box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* --- sprocket strip, top & bottom --- */
  .sprocket-strip{
    height: 22px;
    width: 100%;
    background-image: radial-gradient(circle, var(--bg) 3.5px, transparent 3.6px);
    background-size: 28px 22px;
    background-position: 14px center;
    background-color: #060605;
    border-top: 1px solid var(--hairline);
    border-bottom: 1px solid var(--hairline);
  }

  header{
    padding: 6vw 6vw 4vw;
    background: #060605;
    border-bottom: 1px solid var(--hairline);
  }

  .eyebrow{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 1.1rem;
  }

  h1{
    font-family: 'Fraunces', serif;
    font-optical-sizing: auto;
    font-weight: 500;
    font-size: clamp(2.4rem, 6vw, 4.6rem);
    line-height: 1.02;
    letter-spacing: -0.01em;
    margin: 0 0 1.2rem;
    max-width: 16ch;
  }

  header p.sub{
    font-size: 1rem;
    color: var(--text-muted);
    max-width: 46ch;
    line-height: 1.6;
    margin: 0;
  }

  main{
    padding: 5vw 6vw 8vw;
  }

  .gallery{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 2.6rem 1.8rem;
  }

  figure.frame{
    margin: 0;
    opacity: 0;
    transform: translateY(14px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  figure.frame.visible{
    opacity: 1;
    transform: translateY(0);
  }

  .frame-photo{
    position: relative;
    overflow: hidden;
    background: var(--bg-elevated);
    border: 1px solid var(--hairline);
    cursor: zoom-in;
  }

  .frame-photo img{
    display: block;
    width: 100%;
    height: auto;
    aspect-ratio: 4 / 5;
    object-fit: cover;
    filter: grayscale(0.08) contrast(1.02);
    transition: transform 0.7s cubic-bezier(.2,.7,.2,1), filter 0.5s ease;
  }

  .frame-photo:hover img{
    transform: scale(1.035);
    filter: grayscale(0) contrast(1.05);
  }

  .frame-number{
    position: absolute;
    top: 0.7rem;
    left: 0.7rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.05em;
    color: #d9d4c8;
    background: rgba(6,6,5,0.55);
    padding: 0.2rem 0.5rem;
    border: 1px solid rgba(236,231,221,0.2);
  }

  figcaption{
    margin-top: 0.65rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.74rem;
    line-height: 1.55;
    color: var(--text-muted);
    display: flex;
    flex-wrap: wrap;
    gap: 0 0.9rem;
  }

  figcaption .cap-title{
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.92rem;
    color: var(--text);
    width: 100%;
    margin-bottom: 0.15rem;
  }

  figcaption span::before{
    content: "· ";
    color: var(--accent);
  }
  figcaption span:first-of-type::before{
    content: "";
  }

  /* --- lightbox --- */
  .lightbox{
    position: fixed;
    inset: 0;
    background: rgba(6,6,5,0.94);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4vw;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 100;
  }
  .lightbox.open{ opacity: 1; pointer-events: auto; }

  .lightbox img{
    max-width: 100%;
    max-height: 78vh;
    border: 1px solid var(--hairline);
  }

  .lightbox-panel{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    max-width: 90vw;
  }

  .lightbox-caption{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-muted);
    text-align: center;
  }

  .lightbox-actions{
    display: flex;
    gap: 0.9rem;
  }

  .lightbox-actions a, .lightbox-actions button{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text);
    background: transparent;
    border: 1px solid var(--hairline);
    padding: 0.55rem 1.1rem;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.2s ease, color 0.2s ease;
  }

  .lightbox-actions a:hover, .lightbox-actions button:hover{
    border-color: var(--accent);
    color: var(--accent);
  }

  footer{
    padding: 3vw 6vw 4vw;
    color: var(--text-muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.03em;
    background: #060605;
    border-top: 1px solid var(--hairline);
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; }
  }

  :focus-visible{
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
</style>
</head>
<body>

<div class="sprocket-strip" aria-hidden="true"></div>

<header>
  <p class="eyebrow">Roll 001 — Joo Chiat, Jan 2026</p>
  <h1>Frames, kept.</h1>
  <p class="sub">A walk through Joo Chiat, shot on the Olympus E-M1 Mark II. Tap any frame for the full-resolution original.</p>
</header>

<main>
  <div class="gallery" id="gallery"></div>
</main>

<div class="sprocket-strip" aria-hidden="true"></div>

<footer>
  Hosted on GitHub Pages · Media served via Cloudinary · Updated by hand
</footer>

<div class="lightbox" id="lightbox">
  <div class="lightbox-panel">
    <img id="lightbox-img" src="" alt="">
    <p class="lightbox-caption" id="lightbox-caption"></p>
    <div class="lightbox-actions">
      <a id="lightbox-download" href="#" download>Download full-res</a>
      <button id="lightbox-close" type="button">Close</button>
    </div>
  </div>
</div>

<script>
  // ---------------------------------------------------------------
  // Replace the entries below with your own Cloudinary photos.
  // "src"      -> your Cloudinary delivery URL (with transformations for
  //               the thumbnail, e.g. w_600,c_fill,q_auto,f_auto)
  // "download" -> the full-resolution original, e.g. add fl_attachment
  //               to the same public_id with no size transform
  // ---------------------------------------------------------------
  // Cloudinary cloud name
  const CLOUD_NAME = "ikxlglox";
  const FOLDER = "Photos/Joo-Chiat-26";

  function thumb(publicId){
    return `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/w_600,c_fill,q_auto,f_auto/${FOLDER}/${publicId}`;
  }
  function full(publicId){
    return `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/fl_attachment/${FOLDER}/${publicId}`;
  }

  // Edit the "title" fields below to caption each photo as you like.
  // Camera/lens/location are placeholders — update to match each shot.
  const photos = [
    { id: "20260117_EM50524_ihny15", title: "Joo Chiat, frame 1", camera: "Olympus E-M1 II", lens: "12-40mm f/2.8", location: "Joo Chiat, SG" },
    { id: "20260117_EM50297_wqhqj8", title: "Joo Chiat, frame 2", camera: "Olympus E-M1 II", lens: "12-40mm f/2.8", location: "Joo Chiat, SG" },
    { id: "20260117_EM50322_yvdbud", title: "Joo Chiat, frame 3", camera: "Olympus E-M1 II", lens: "12-40mm f/2.8", location: "Joo Chiat, SG" },
    { id: "20260117_EM50343_mxaldi", title: "Joo Chiat, frame 4", camera: "Olympus E-M1 II", lens: "12-40mm f/2.8", location: "Joo Chiat, SG" },
    { id: "20260117_EM50313_k1u3um", title: "Joo Chiat, frame 5", camera: "Olympus E-M1 II", lens: "12-40mm f/2.8", location: "Joo Chiat, SG" },
    { id: "20260117_EM50400_eplatr", title: "Joo Chiat, frame 6", camera: "Olympus E-M1 II", lens: "12-40mm f/2.8", location: "Joo Chiat, SG" },
    { id: "20260117_EM50604_ogsmc9", title: "Joo Chiat, frame 7", camera: "Olympus E-M1 II", lens: "12-40mm f/2.8", location: "Joo Chiat, SG" },
    { id: "20260117_EM50372_qomvur", title: "Joo Chiat, frame 8", camera: "Olympus E-M1 II", lens: "12-40mm f/2.8", location: "Joo Chiat, SG" },
    { id: "20260117_EM50517_yokw6l", title: "Joo Chiat, frame 9", camera: "Olympus E-M1 II", lens: "12-40mm f/2.8", location: "Joo Chiat, SG" }
  ].map(p => ({
    title: p.title,
    src: thumb(p.id),
    download: full(p.id),
    camera: p.camera,
    lens: p.lens,
    location: p.location
  }));

  const gallery = document.getElementById('gallery');

  photos.forEach((p, i) => {
    const fig = document.createElement('figure');
    fig.className = 'frame';
    fig.innerHTML = `
      <div class="frame-photo" tabindex="0" role="button" aria-label="Open ${p.title} full size">
        <span class="frame-number">F${String(i + 1).padStart(3, '0')}</span>
        <img src="${p.src}" alt="${p.title}" loading="lazy">
      </div>
      <figcaption>
        <span class="cap-title">${p.title}</span>
        <span>${p.camera}</span>
        <span>${p.lens}</span>
        <span>${p.location}</span>
      </figcaption>
    `;
    gallery.appendChild(fig);

    const opener = () => openLightbox(p);
    fig.querySelector('.frame-photo').addEventListener('click', opener);
    fig.querySelector('.frame-photo').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); opener(); }
    });
  });

  // scroll reveal
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        io.unobserve(e.target);
      }
    });
  }, { threshold: 0.12 });
  document.querySelectorAll('figure.frame').forEach(f => io.observe(f));

  // lightbox
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lightbox-img');
  const lbCap = document.getElementById('lightbox-caption');
  const lbDownload = document.getElementById('lightbox-download');
  const lbClose = document.getElementById('lightbox-close');

  function openLightbox(p){
    lbImg.src = p.download;
    lbImg.alt = p.title;
    lbCap.textContent = `${p.title} — ${p.camera}, ${p.lens} — ${p.location}`;
    lbDownload.href = p.download;
    lightbox.classList.add('open');
  }
  function closeLightbox(){
    lightbox.classList.remove('open');
    lbImg.src = "";
  }
  lbClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });
</script>

</body>
</html>
