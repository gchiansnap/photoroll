<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCHIANSNAP — Street, Travel, Nature</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="96x96" href="assets/favicon-96x96.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
<link rel="shortcut icon" href="assets/favicon.ico">
</head>
<body>

<div class="hero">
  <picture>
    <source id="hero-source-mobile" media="(max-width: 700px)" srcset="">
    <source id="hero-source-desktop" media="(min-width: 701px)" srcset="">
    <img id="hero-img" src="" alt="">
  </picture>
  <div class="hero-scrim"></div>
  <div class="hero-content">
    <p class="hero-eyebrow">Street &bull; Travel &bull; Nature</p>
    <h1 class="hero-title">GCHIANSNAP</h1>
    <p class="hero-sub">Based in Singapore &#127480;&#127468;</p>
    <a class="hero-about-link" href="about.html">About me &rarr;</a>
  </div>
</div>

<section class="featured">
  <div class="feature-grid" id="feature-grid"></div>
</section>

<section class="collections-section">
  <button class="section-toggle" id="collections-toggle" aria-expanded="false">
    <h2>Collections</h2>
    <span class="toggle-arrow">&rsaquo;</span>
  </button>
  <div class="collapsible" id="collections-collapsible">
    <div class="collapsible-inner">
      <div class="album-list" id="album-list"></div>
    </div>
  </div>
</section>

<section class="collections-section">
  <div class="album-list" id="private-gallery-list"></div>
</section>

<footer>
  Thanks for taking the time to look around.<br>
  A personal photography project by Greg Chian
</footer>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
  <button class="lightbox-slideshow-trigger" id="lightbox-slideshow-trigger">Slideshow</button>
  <span class="lightbox-nav prev" id="lightbox-prev" aria-label="Previous">&lsaquo;</span>
  <span class="lightbox-nav next" id="lightbox-next" aria-label="Next">&rsaquo;</span>
  <div class="lightbox-stage">
    <img id="lightbox-img" src="" alt="">
  </div>
  <div class="lightbox-info">
    <p class="lightbox-title" id="lightbox-title"></p>
    <p class="lightbox-meta" id="lightbox-meta"></p>
    <p class="lightbox-gear" id="lightbox-gear"></p>
    <p class="lightbox-exif" id="lightbox-exif"></p>
    <a class="lightbox-download" id="lightbox-download" href="#" download>Download original</a>
  </div>
  <div class="lightstrip" id="lightstrip"></div>
</div>

<script src="js/config.js"></script>
<script src="js/cloudinary.js"></script>
<script src="js/analytics.js"></script>
<script src="js/exif-data.js"></script>
<script src="js/lightbox.js"></script>
<script src="js/home.js"></script>


<div class="slideshow" id="slideshow">
  <img id="slideshow-img" src="" alt="">
  <div class="slideshow-overlay">
    <p class="slideshow-caption" id="slideshow-caption"></p>
    <p class="slideshow-exif" id="slideshow-exif"></p>
  </div>
  <div class="slideshow-controls">
    <button id="slideshow-playpause" aria-label="Play or pause"><span class="icon">&#10073;&#10073;</span></button>
    <button id="slideshow-settings-btn" aria-label="Settings"><span class="icon">&#9881;</span></button>
    <button id="slideshow-close" aria-label="Close">&times;</button>
  </div>
  <div class="slideshow-settings" id="slideshow-settings">
    <fieldset>
      <legend>Speed</legend>
      <label><input type="radio" name="slideshow-speed" value="8"> Slow (8s)</label>
      <label><input type="radio" name="slideshow-speed" value="4" checked> Medium (4s)</label>
      <label><input type="radio" name="slideshow-speed" value="2"> Fast (2s)</label>
    </fieldset>
    <fieldset>
      <legend>Display</legend>
      <label><input type="radio" name="slideshow-display" value="captions"> Captions</label>
      <label><input type="radio" name="slideshow-display" value="exif"> EXIF data</label>
      <label><input type="radio" name="slideshow-display" value="all" checked> All</label>
      <label><input type="radio" name="slideshow-display" value="none"> None</label>
    </fieldset>
  </div>
</div>
<script src="js/slideshow.js"></script>
