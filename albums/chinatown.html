<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinatown — GCHIANSNAP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/main.css">
<link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="96x96" href="../assets/favicon-96x96.png">
<link rel="apple-touch-icon" sizes="180x180" href="../assets/apple-touch-icon.png">
<link rel="shortcut icon" href="../assets/favicon.ico">
</head>
<body>

<a class="back-link" href="../index.html">&larr; GCHIANSNAP</a>

<header class="page-header" id="album-header">
  <p class="eyebrow" id="album-eyebrow"></p>
  <h1 id="album-title"></h1>
  <p class="sub" id="album-desc"></p>
</header>

<p style="margin: 0 6vw 2vw;">
  <button class="slideshow-trigger" id="page-slideshow-trigger">Slideshow &rarr;</button>
</p>

<main>
  <div class="gallery" id="gallery"></div>
</main>

<footer>
  Hosted on GitHub Pages · Media served via Cloudinary
</footer>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
  <button class="lightbox-slideshow-trigger" id="lightbox-slideshow-trigger">Slideshow</button>
  <span class="lightbox-nav prev" id="lightbox-prev" aria-label="Previous">&lsaquo;</span>
  <span class="lightbox-nav next" id="lightbox-next" aria-label="Next">&rsaquo;</span>
  <div class="lightbox-stage">
    <img id="lightbox-img" src="" alt="">
  </div>
  <div class="lightbox-info">
    <p class="lightbox-title" id="lightbox-title"></p>
    <p class="lightbox-meta" id="lightbox-meta"></p>
    <p class="lightbox-gear" id="lightbox-gear"></p>
    <p class="lightbox-exif" id="lightbox-exif"></p>
    <a class="lightbox-download" id="lightbox-download" href="#" download>Download original</a>
  </div>
  <div class="lightstrip" id="lightstrip"></div>
</div>

<script src="../js/config.js"></script>
<script src="../js/cloudinary.js"></script>
<script src="../js/exif-data.js"></script>
<script src="../js/lightbox.js"></script>
<script>
  // This album is defined in js/config.js — find it by matching the
  // filename of this page against each album's slug.
  const slug = "chinatown";
  const album = CONFIG.albums.find(a => a.slug === slug);

  let photos = [];

  function renderHeader() {
    document.getElementById('album-eyebrow').textContent = album.subtitle;
    document.getElementById('album-title').textContent = album.title;
    document.getElementById('album-desc').textContent = album.description;
    document.title = `${album.title} — GCHIANSNAP`;
  }

  function renderGallery() {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';

    photos.forEach((p, i) => {
      const fig = document.createElement('figure');
      fig.className = 'tile';
      fig.innerHTML = `<img src="${p.thumb}" alt="${p.title}" loading="lazy">`;
      fig.addEventListener('click', () => Lightbox.open(photos, i));
      gallery.appendChild(fig);
    });

    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.08 });
    document.querySelectorAll('figure.tile').forEach(f => io.observe(f));
  }

  // --- load photos by tag ---
  async function init() {
    renderHeader();
    const resources = await Cloudinary.fetchByTag(album.tag);

    if (!resources.length) {
      document.getElementById('gallery').innerHTML =
        `<p style="color: var(--text-dim); font-size: 0.9rem;">No photos tagged "${album.tag}" yet — tag some in Cloudinary to populate this album.</p>`;
      return;
    }

    photos = resources.map((r) => ({
      id: r.public_id,
      title: Cloudinary.captionFor(r, ''),
      thumb: Cloudinary.thumbUrl(r.public_id, 800),
      stage: Cloudinary.stageUrl(r.public_id, 1600),
      download: Cloudinary.downloadUrl(r.public_id),
      location: album.title,
      exif: exifForPublicId(r.public_id)
    }));

    renderGallery();
  }

  init();

  const slideshowTrigger = document.getElementById('page-slideshow-trigger');
  if (slideshowTrigger) {
    slideshowTrigger.addEventListener('click', () => {
      if (photos.length) Slideshow.open(photos, 0);
    });
  }
</script>


<div class="slideshow" id="slideshow">
  <img id="slideshow-img" src="" alt="">
  <div class="slideshow-overlay">
    <p class="slideshow-caption" id="slideshow-caption"></p>
    <p class="slideshow-exif" id="slideshow-exif"></p>
  </div>
  <div class="slideshow-controls">
    <button id="slideshow-playpause" aria-label="Play or pause"><span class="icon">&#10073;&#10073;</span></button>
    <button id="slideshow-settings-btn" aria-label="Settings"><span class="icon">&#9881;</span></button>
    <button id="slideshow-close" aria-label="Close">&times;</button>
  </div>
  <div class="slideshow-settings" id="slideshow-settings">
    <fieldset>
      <legend>Speed</legend>
      <label><input type="radio" name="slideshow-speed" value="8"> Slow (8s)</label>
      <label><input type="radio" name="slideshow-speed" value="4" checked> Medium (4s)</label>
      <label><input type="radio" name="slideshow-speed" value="2"> Fast (2s)</label>
    </fieldset>
    <fieldset>
      <legend>Display</legend>
      <label><input type="radio" name="slideshow-display" value="captions"> Captions</label>
      <label><input type="radio" name="slideshow-display" value="exif"> EXIF data</label>
      <label><input type="radio" name="slideshow-display" value="all" checked> All</label>
      <label><input type="radio" name="slideshow-display" value="none"> None</label>
    </fieldset>
  </div>
</div>
<script src="../js/slideshow.js"></script>

</body>
</html>
